services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
      - ./acme:/var/www/certbot
      - adsphere_ui_dist:/var/www/adsphere-ui
      - adsphere_admin_dist:/var/www/adsphere-admin
    restart: unless-stopped

  adsphere-backend:
    image: adsphere-backend:1.0.5
    container_name: adsphere-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CORS_ORIGIN=https://adsphere.software,https://admin.adsphere.software
      - JWT_SECRET=your_jwt_secret_key_here
      - JWT_EXPIRATION=7d
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - MONGODB_URI=mongodb://mongodb:27017/adsphere
      - MONGODB_USER=adspheremongo
      - MONGODB_PASSWORD=your_mongodb_password_here
      - CLOUDINARY_CLOUD_NAME=your_cloudinary_cloud_name_here
      - CLOUDINARY_API_KEY=your_cloudinary_api_key_here
      - CLOUDINARY_API_SECRET=your_cloudinary_api_secret_here
      - GOOGLE_CLIENT_ID=your_google_client_id_here
      - GOOGLE_CLIENT_SECRET=your_google_client_secret_here
      - GOOGLE_CALLBACK_URL=https://api.adsphere.software/api/v1/auth/google/callback
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ADSPHERE_AI_SERVICE_URL=http://adsphere-ai:8090
      # Frontend public URL used for OAuth redirects
      - FRONTEND_PUBLIC_URL=https://adsphere.software
    depends_on:
      - mongodb
      - rabbitmq
      - elasticsearch
    restart: always
  
  adsphere-ai:
    image: adsphere-ai:1.0.5
    container_name: adsphere-ai
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_QUEUE=ads.process
      - MONGODB_URI=mongodb://mongodb:27017/adsphere
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DB=adsphere
      - MONGODB_USER=adspheremongo
      - MONGODB_PASS=your_mongodb_password_here
      - OPENAI_API_KEY=your_openai_api_key_here
      - OPENAI_MODEL=gpt-4.1
      - RUN_WEB_SCRAPING=true
    depends_on:
      - mongodb
      - rabbitmq
    restart: always
  mongodb:
    image: mongo:8.0.10
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: adspheremongo
      MONGO_INITDB_ROOT_PASSWORD: your_mongodb_password_here
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: 2g
    restart: unless-stopped

volumes:
  mongodb_data:
  es_data:
  adsphere_ui_dist:
    external: true
  adsphere_admin_dist:
    external: true