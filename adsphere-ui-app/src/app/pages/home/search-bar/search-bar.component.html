<nz-card>
  <div class="flex flex-col sm:flex-row gap-4 mt-5">
    <!-- Câmpul de căutare -->
    <nz-form-item class="w-full">
      <nz-form-control>
        <input
          nz-input
          [(ngModel)]="searchInput"
          nzSize="large"
          name="searchInput"
          placeholder="Ce vrei să cauți astăzi?"
          (keydown.enter)="handleSubmitSearch()"/>
        <i nz-icon nzType="search" nzTheme="outline" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
      </nz-form-control>
    </nz-form-item>

    <!-- Câmpul de locație -->
    <nz-form-item class="sm:w-1/3">
      <nz-form-control nzErrorTip="Alege o localitate validă pentru cautare precisă">
        <input
          nz-input
          #localityInput="ngModel"
          [(ngModel)]="selectedLocalityLabel"
          name="selectedLocality"
          [nzAutocomplete]="locationAuto"
          nz-tooltip="Caută după județ și/sau localitate"
          nzSize="large"
          placeholder="Toate localitățile"
          (input)="onLocalityChange($event)"
          (blur)="onLocalityBlur($event)"
          (selectionchange)="onLocalitySelect($event)"
        />
        <i nz-icon nzType="pushpin" nzTheme="outline" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
      </nz-form-control>
      <nz-autocomplete #locationAuto >
        @if(isLocalitiesLoading()){
          <nz-spin [nzSpinning]="true" nzSize="small" class="w-full h-full">
            <span>Se încarcă...</span>
          </nz-spin>
        } @else {
          @for(loc of suggestedLocalities(); track loc._id) {
            <nz-auto-option [nzValue]="loc.name"  [nzLabel]="loc.county.toUpperCase() + ' | ' + loc.name">
              <strong>{{loc.county | uppercase}}</strong> | {{ loc.name }}
            </nz-auto-option>
          }
        }
      </nz-autocomplete>
    </nz-form-item>
    <!-- Search by image -->
<!--    <button nz-button nzType="default" nzSize="large" nz-tooltip="Caută după imagine"-->
<!--            nzShape="circle" class="h-full w-12 flex justify-center items-center">-->
<!--      <nz-icon nzType="file-image" nzTheme="outline" />-->
<!--    </button>-->
  <!-- Locate me -->
    <button nz-button nzType="default" nzSize="large" nz-tooltip="Obține locația curentă automat"
            nzShape="circle" class="h-full w-12 flex justify-center items-center"
    (click)="handleLocateMe()">
      <nz-icon nzType="environment" nzTheme="outline" />
    </button>
    <!-- Butonul de căutare -->
    <button nz-button nzType="primary"  nzSize="large"
            nzShape="circle" class="h-full w-12 flex justify-center items-center"
            (click)="handleSubmitSearch()"
            [disabled]="!canSubmitSearch()">
      <i nz-icon nzType="search"></i>
    </button>
  </div>
</nz-card>
