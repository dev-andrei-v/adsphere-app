<div class="w-80 flex flex-col">
  <h2 class="text-lg font-bold p-4">Conversații cu vânzători</h2>
  @if(conversations.length === 0) {
    <div class="flex-1 flex ml-5 text-gray-400">
      Nu există conversații
    </div>
  } @else {
    <nz-list class="flex-1 overflow-auto" [nzLoading]="isLoading">
      @for(item of conversations; track item.lastMessageDate) {
        <div class="px-4 py-1"
             [class.cursor-pointer]="true"
             [class.transition]="true"
             [class.hover:bg-gray-100]="true"
             [class.bg-gray-200]="selectedConversation?.adId === item.adId"
             (click)="onSelect(item)">
          <nz-list-item>
            <nz-list-item-meta
              [nzAvatar]="item?.adImage ?? '/no-image.jpg'"
              [nzTitle]="conversationTitle(item)"
              [nzDescription]="conversationDescription(item)">
            </nz-list-item-meta>
          </nz-list-item>
        </div>
      }
    </nz-list>
    }
</div>
